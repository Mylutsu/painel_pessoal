<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8 Mirror">
    <title>Histórico de Concluídas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> <style>
        /* Reutilizando seu estilo do index para manter o padrão */
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .nota-card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #28a745; }
        .btn-voltar { display: inline-block; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; margin-bottom: 20px; }
        .btn-voltar:hover { background: #5a6268; }
        .container { max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="btn-voltar">⬅️ Voltar ao Painel Principal</a>
        
        <h2 style="text-align: center;">✅ Histórico de Notas Concluídas</h2>
        <p style="text-align: center; color: #666;">Estas são as tarefas que você já finalizou.</p>

        <div class="notas-container">
            {% for n in notas %}
            <div class="nota-card" style="border-left: 5px solid #28a745; padding: 15px; margin-bottom: 15px;">
                <div>
                    <strong style="font-size: 1.1em;">{{ n[1] }}</strong>
                    <p style="margin: 8px 0; color: #444;">{{ n[2] }}</p>
                    <div style="margin-bottom: 12px;">
                        <small style="color: #666; background: #eee; padding: 2px 6px; border-radius: 3px;">
                            Categoria: {{ n[3] }}
                        </small>
                        {% if n[7] %}
                        <small style="color: #666; background: #eee; padding: 2px 6px; border-radius: 3px; margin-left: 5px;">
                            Vencimento original: {{ n[7] }}
                        </small>
                        {% endif %}
                    </div>
                </div>

                <a href="/restaurar/{{ n[0] }}" 
                   style="text-decoration: none; background: #007bff; color: white; padding: 6px 12px; border-radius: 4px; font-size: 0.85em; font-weight: bold; display: inline-block; transition: background 0.2s;"
                   onmouseover="this.style.background='#0056b3'"
                   onmouseout="this.style.background='#007bff'">
                   ↩️ Restaurar Nota
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
